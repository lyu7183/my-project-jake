<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>골프 레슨 | 형석 프로</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f5f5f5;
    }

    header{
      background:#1e7f3f;
      color:white;
      padding:30px;
      text-align:center;
    }

    section{
      max-width:900px;
      margin:40px auto;
      background:white;
      padding:30px;
      border-radius:10px;
    }

    h2{
      border-bottom:2px solid #eee;
      padding-bottom:10px;
    }

    .price{
      font-size:20px;
      font-weight:bold;
      color:#1e7f3f;
    }

    .button{
      display:inline-block;
      margin-top:20px;
      padding:15px 25px;
      background:#1e7f3f;
      color:white;
      text-decoration:none;
      border-radius:6px;
    }
  </style>
</head>

<body>

<header>
  <h1>형석 프로 골프 레슨</h1>
  <p>초보부터 싱글까지 맞춤 레슨</p>
</header>

<section>
  <h2>프로 소개</h2>
  <p>
    KPGA 프로 / 개인 맞춤 스윙 분석  
    초보, 구력자 모두 환영합니다.
  </p>
</section>

<section>
  <h2>레슨 프로그램</h2>
  <p>1:1 개인 레슨</p>
  <p>스윙 분석 및 교정</p>
  <p>필드 레슨</p>
</section>

<section>
  <h2>레슨 가격</h2>
  <p class="price">1회 레슨 70,000원</p>
</section>

<section>
  <h2>레슨 문의</h2>
  <p>전화: 010-0000-0000</p>
  <a class="button" href="#">레슨 문의하기</a>
</section>

</body>
</html>
