<section>
  <h2>레슨 문의</h2>
  <p>전화: 010-0000-0000</p>

  <!-- 버튼 -->
  <a class="button" href="javascript:void(0)" onclick="showPrice()">신청하기</a>

  <!-- 가격 안내 div (초기에는 숨김) -->
  <div id="priceInfo" style="display:none; margin-top:15px; padding:15px; background:#e0f7e0; border-radius:8px;">
    <p>50분 8회: 500,000원</p>
    <p>50분 20회: 1,000,000원</p>
  </div>
</section>

<script>
  function showPrice() {
    const priceDiv = document.getElementById('priceInfo');
    if(priceDiv.style.display === 'none'){
      priceDiv.style.display = 'block';
    } else {
      priceDiv.style.display = 'none';
    }
  }
</script>
