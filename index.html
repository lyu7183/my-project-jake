<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>골프 레슨</title>

<style>
body{
    margin:0;
    font-family:Arial;
}

.main{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;

    background-image:url("golf.png");
    background-size:cover;
    background-position:center;
}
button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.price{
    opacity: 0;
    visibility: hidden;
    transform: translateY(-20px);
    transition: all 0.5s ease;
    background:white;
    color:black;
    padding:30px;
    border-radius:10px;
    margin-top:20px;
}
.price.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="main">

<h1>프라이빗 골프 레슨</h1>

<button class="lesson-btn" onclick="togglePrice()">레슨 신청하기</button>

<div class="price" id="priceTable">
    <h2>레슨 가격</h2>
    <p>50분 × 8회 : 50만원</p>
    <p>50분 × 20회 : 100만원</p>
</div>

</div>

<script>
function togglePrice(){
    var priceTable = document.getElementById("priceTable");
    priceTable.classList.toggle('show');
}
</script>

</body>
</html>
.main::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
}

.main *{
    position:relative;
}
