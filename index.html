<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>형석 골프 레슨</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e6f0ff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #004080;
      color: white;
      padding: 30px 0;
    }
    header h1 {
      margin: 0;
      font-size: 36px;
    }
    header p {
      margin: 5px 0 0 0;
      font-size: 18px;
    }
    .profile-img {
      margin: 20px auto;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #004080;
    }
    .section {
      margin: 20px;
      padding: 20px;
      background: #ffffff;
      border-radius: 10px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      background: #004080;
      color: white;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #0066cc;
    }
    footer {
      margin-top: 30px;
      padding: 20px;
      background: #004080;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>형석 골프 레슨</h1>
    <p>초보부터 고수까지, 맞춤 레슨!</p>
  </header>

  <img src="profile.jpg" alt="형석 강사" class="profile-img">

  <div class="section">
    <h2>레슨 소개</h2>
    <p>저는 골프 강사 형석입니다. 기본 스윙부터 퍼팅, 코스 전략까지  
    개인 맞춤 레슨을 제공합니다. 즐겁게 배우면서 실력을 올려보세요!</p>
  </div>

  <div class="section">
    <h2>레슨 신청</h2>
    <button onclick="alert('문의: 010-2309-7182, 카카오톡 ID: lyu7183')">신청하기</button>
  </div>

  <footer>
    <p>문의: 010-2309-7182 | 카카오톡: lyu7183</p>
    <p>© 2026 형석 골프 레슨</p>
  </footer>

</body>
</html>
