<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>골프 레슨</title>

<style>
body{
    margin:0;
    font-family:Arial;
}

.main{
    background:#0a3cff;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.price{
    display:none;
    background:white;
    color:black;
    padding:30px;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="main">

<h1>프라이빗 골프 레슨</h1>

<button onclick="showPrice()">신청하기</button>

<div class="price" id="priceTable">
<h2>레슨 가격</h2>
<p>50분 × 8회 : 50만원</p>
<p>50분 × 20회 : 100만원</p>
</div>

</div>

<script>
function showPrice(){
    document.getElementById("priceTable").style.display = "block";
}
</script>

</body>
</html>
