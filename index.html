<section>
  <h2>레슨 문의</h2>
  <p>전화: 010-0000-0000</p>
  
  <!-- 버튼 -->
  <button class="button" onclick="showPrice()">신청하기</button>
  
  <!-- 가격 안내가 표시될 영역 -->
  <div id="priceInfo" style="display:none; margin-top:15px; padding:10px; background:#e0f7e0; border-radius:6px;">
    <p>50분 8회: 500,000원</p>
    <p>50분 20회: 1,000,000원</p>
  </div>
</section>

<script>
  function showPrice() {
    const priceDiv = document.getElementById('priceInfo');
    // 버튼 누를 때마다 보여주기/숨기기
    if(priceDiv.style.display === 'none'){
      priceDiv.style.display = 'block';
    } else {
      priceDiv.style.display = 'none';
    }
  }
</script>
